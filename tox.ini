[tox]
envlist = lint, format, typecheck, test

[testenv:test]
deps =
    pytest
    tzlocal
commands =
    pytest {posargs:tests/}

[testenv:lint]
skip_install = true
deps =
    ruff
commands =
    ruff check {posargs:logflux/ tests/}

[testenv:typecheck]
skip_install = true
deps =
    mypy
    types-PyYAML
commands =
    mypy {posargs:logflux/}

[testenv:format]
skip_install = true
deps =
    black
commands =
    black --check {posargs:logflux/ tests/}
